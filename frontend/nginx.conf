server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vite hashes assets in their filenames, so they can be cached aggressively.
    location /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA: any unknown path falls back to index.html so client-side routes work.
    location / {
        try_files $uri $uri/ /index.html;
        # index.html itself must not be cached, otherwise users get stuck on
        # an old shell pointing at deleted hashed assets.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
