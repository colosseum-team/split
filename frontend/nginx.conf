server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vite hashes assets in their filenames, so they can be cached aggressively.
    location /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API reverse proxy. The browser hits the same origin as the SPA, so we
    # avoid opening port 4000 in the Oracle security list and we stay
    # same-origin once TLS lands on the frontend host.
    #
    # Trailing slashes are deliberate: `/api/auth/nonce` → `http://backend:4000/auth/nonce`.
    # The `backend` hostname resolves over the docker compose network.
    location /api/ {
        proxy_pass http://backend:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # QVAC backend inference (`/ai/copilot-preview`, `/contracts/:id/copilot-run`,
        # `/contracts/:id/dispute-run`) runs a local Bare worker. The first call
        # after a cold start streams tokens for tens of seconds; the default 60s
        # nginx read timeout was producing 504s before the worker finished.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA: any unknown path falls back to index.html so client-side routes work.
    location / {
        try_files $uri $uri/ /index.html;
        # index.html itself must not be cached, otherwise users get stuck on
        # an old shell pointing at deleted hashed assets.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
