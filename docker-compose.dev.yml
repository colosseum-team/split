services:
  postgres:
    image: postgres:16-alpine
    container_name: split-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-split}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-split}
      POSTGRES_DB: ${POSTGRES_DB:-split}
    ports:
      - '5432:5432'
    volumes:
      - split-postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-split} -d ${POSTGRES_DB:-split}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    image: split-backend-dev:local
    container_name: split-backend-dev
    working_dir: /workspace
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://split:split@postgres:5432/split}
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-change-me-please}
      PORT: 4000
      HOST: 0.0.0.0
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:3000}
      MOCK_CHAIN: ${MOCK_CHAIN:-true}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      ARBITER_AUTOEXECUTE: ${ARBITER_AUTOEXECUTE:-false}
      ARBITER_PRIVATE_KEY: ${ARBITER_PRIVATE_KEY:-}
      QVAC_ENABLED: ${QVAC_ENABLED:-true}
      QVAC_MODEL_ID: ${QVAC_MODEL_ID:-qvac-llamacpp}
      QVAC_MODEL_VERSION: ${QVAC_MODEL_VERSION:-0.17.4}
      QVAC_RPC_INIT_TIMEOUT_MS: '900000'
    ports:
      - '4000:4000'
    shm_size: '512mb'
    volumes:
      - ./:/workspace
      # Single root node_modules volume so workspaces hoist @qvac/sdk to node_modules/@qvac/sdk (patch-package path).
      - split-node-modules:/workspace/node_modules
    command: >
      sh -c "
      set -e &&
      npm install --workspaces=false --include-workspace-root &&
      npm install --workspace backend --include-workspace-root --no-save &&
      npx patch-package &&
      npm run prisma:generate --workspace backend &&
      npm run prisma:deploy --workspace backend &&
      npm run dev --workspace backend
      "

  frontend:
    image: node:22-bookworm-slim
    container_name: split-frontend-dev
    working_dir: /workspace
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
      VITE_AI_SOURCE: ${VITE_AI_SOURCE:-qvac}
    ports:
      - '5173:5173'
    volumes:
      - ./:/workspace
      - split-node-modules:/workspace/node_modules
      - split-frontend-node-modules:/workspace/frontend/node_modules
    command: >
      sh -c "
      npm install --workspaces=false --include-workspace-root &&
      npm install --workspace frontend --include-workspace-root --no-save &&
      npm run dev --workspace frontend -- --host 0.0.0.0 --port 5173 --strictPort
      "

volumes:
  split-postgres-dev-data:
  split-node-modules:
  split-frontend-node-modules:
