# Production stack for the Split deployment server.
# Used by .github/workflows/deploy.yml — a manual workflow_dispatch
# pulls the requested ref on the host and runs `docker compose up -d --build`.

services:
  postgres:
    image: postgres:16-alpine
    container_name: split-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-split}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-split}
      POSTGRES_DB: ${POSTGRES_DB:-split}
    # Not published on the host — only services on the compose network can
    # reach Postgres. For ad-hoc psql on the deploy host:
    #   docker compose exec postgres psql -U split -d split
    expose:
      - '5432'
    volumes:
      - split-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-split} -d ${POSTGRES_DB:-split}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: split-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: '4000'
      HOST: 0.0.0.0
      DATABASE_URL: postgres://${POSTGRES_USER:-split}:${POSTGRES_PASSWORD:-split}@postgres:5432/${POSTGRES_DB:-split}
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-change-me-please}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://app.escros.work.gd,https://escros.work.gd,http://localhost:5173}
      MOCK_CHAIN: ${MOCK_CHAIN:-true}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      ARBITER_AUTOEXECUTE: ${ARBITER_AUTOEXECUTE:-false}
      ARBITER_PRIVATE_KEY: ${ARBITER_PRIVATE_KEY:-}
    # Not published on the host. Reached only through the frontend nginx
    # `/api/*` reverse proxy on the compose network. Avoids requiring an
    # extra hole in the Oracle security list and keeps the API same-origin
    # once TLS lands on the frontend host.
    expose:
      - '4000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(\"http\").get(\"http://127.0.0.1:4000/health\", (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on(\"error\", () => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Same-origin API base: the SPA fetches /api/*; nginx (in this same
        # container) proxies it to the backend on the compose network. No
        # CORS, no hard-coded host, and stays correct after TLS rotates.
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: split-frontend
    restart: unless-stopped
    # No host port — public traffic comes through Caddy on 443 (HTTPS) and
    # Caddy reverse-proxies to `frontend:80` over the compose network.
    expose:
      - '80'

  landing:
    build:
      context: .
      dockerfile: landing/Dockerfile
      args:
        # NEXT_PUBLIC_* are inlined into the JS bundle at build time, so they
        # must be set when the image is built, not at container start.
        # The "Try the demo" CTA goes to the SPA on app.escros.work.gd.
        NEXT_PUBLIC_DEMO_URL: ${NEXT_PUBLIC_DEMO_URL:-https://app.escros.work.gd}
        NEXT_PUBLIC_GITHUB_URL: ${NEXT_PUBLIC_GITHUB_URL:-https://github.com/colosseum-team/split}
    container_name: split-landing
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    # No host port — public traffic comes through Caddy on 443 and Caddy
    # reverse-proxies to `landing:3000` over the compose network.
    expose:
      - '3000'

  caddy:
    image: caddy:2-alpine
    container_name: split-caddy
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      # 80 is required for the HTTP-01 challenge that issues the cert and for
      # automatic HTTP→HTTPS redirects. 443 serves HTTPS; 443/udp enables HTTP/3.
      - '80:80'
      - '443:443'
      - '443:443/udp'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - split-caddy-data:/data
      - split-caddy-config:/config

volumes:
  split-postgres-data:
  split-caddy-data:
  split-caddy-config:
