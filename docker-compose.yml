# Production stack for the Split deployment server.
# `landing` is the only service with a working Dockerfile right now;
# add `frontend`/`backend` blocks alongside as their Dockerfiles land.
#
# Used by .github/workflows/deploy.yml — a manual workflow_dispatch
# pulls the requested ref on the host and runs `docker compose up -d --build`.

services:
  landing:
    build:
      context: .
      dockerfile: landing/Dockerfile
      args:
        # NEXT_PUBLIC_* are inlined into the JS bundle at build time, so they
        # must be set when the image is built, not at container start.
        NEXT_PUBLIC_DEMO_URL: ${NEXT_PUBLIC_DEMO_URL:-https://github.com/colosseum-team/split}
        NEXT_PUBLIC_GITHUB_URL: ${NEXT_PUBLIC_GITHUB_URL:-https://github.com/colosseum-team/split}
    container_name: split-landing
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "3001:3000"
