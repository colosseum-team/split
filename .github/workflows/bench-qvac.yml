name: Bench QVAC

# Runs the standalone scripts/bench-qvac.mjs inside the live split-backend
# container on the deploy host via SSH + docker exec. Each node invocation
# spawns its own Bare worker, so this does not interfere with the running
# Fastify server. Reuses the same SSH secrets as the Deploy workflow.
#
# Trigger: Actions → "Bench QVAC" → "Run workflow".

on:
  workflow_dispatch:
    inputs:
      models:
        description: 'Comma-separated @qvac/sdk model constants (default benches 6 candidates)'
        required: false
        default: 'LLAMA_3_2_1B_INST_Q4_0,QWEN3_600M_INST_Q4,BITNET_0_7B_INST_TQ2_0,BITNET_1B_INST_TQ2_0,LLAMA_TOOL_CALLING_1B_INST_Q4_K,QWEN3_1_7B_INST_Q4'

concurrency:
  group: bench-qvac
  cancel-in-progress: true

jobs:
  bench:
    name: Bench QVAC inference on prod host
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout (just to ship the bench script)
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy bench script onto host
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          scp -i ~/.ssh/id_deploy -o BatchMode=yes \
            scripts/bench-qvac.mjs \
            "$SSH_USER@$SSH_HOST:/tmp/bench-qvac.mjs"

      - name: Run bench inside split-backend container
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          MODELS: ${{ github.event.inputs.models }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_deploy -o BatchMode=yes -o SendEnv=MODELS "$SSH_USER@$SSH_HOST" \
            MODELS="$MODELS" \
            bash -se <<'REMOTE'
          set -euo pipefail
          # The script must live inside /app so Node ESM resolves @qvac/sdk
          # from /app/node_modules (NODE_PATH is ignored in ESM mode).
          docker exec split-backend mkdir -p /app/scripts
          docker cp /tmp/bench-qvac.mjs split-backend:/app/scripts/bench-qvac.mjs

          # Capture container CPU/mem snapshot for context.
          echo '--- container resources ---'
          docker exec split-backend sh -c 'echo "nproc:" $(nproc); grep -m1 "model name" /proc/cpuinfo 2>/dev/null || true; cat /proc/meminfo | head -3'
          echo '--- bench output ---'
          # HOME=/tmp/qvac-bench-home redirects every QVAC path lookup
          # (.qvac/registry-corestore + .qvac/models) into a private tree
          # so the Bare worker spawned by this bench doesn't compete with
          # the live Fastify worker for the registry RocksDB lock.
          docker exec split-backend mkdir -p /tmp/qvac-bench-home
          docker exec \
            -e MODELS="$MODELS" \
            -e HOME=/tmp/qvac-bench-home \
            -w /app split-backend node scripts/bench-qvac.mjs
          REMOTE
