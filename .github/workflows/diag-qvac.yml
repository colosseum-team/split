name: Diag QVAC

# Restarts the live backend container, waits for QVAC warmup, then runs an
# end-to-end SIWS auth + /ai/copilot-preview smoke from the runner against
# the public app subdomain. Reports the wall-clock time of the inference
# HTTP call so we can compare:
#
#   - inside-container inference (Bench QVAC):     ~10s for copilot prompt
#   - through Caddy + nginx after a fresh restart: ?  (this workflow)
#
# A large gap between those two answers means something specific to the
# long-running Fastify worker is wedging the SDK between warmup and first
# real /completion call.

on:
  workflow_dispatch:

concurrency:
  group: diag-qvac
  cancel-in-progress: true

jobs:
  diag:
    name: Restart + measure first inference
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install minimal SIWS deps
        run: npm i --no-save --no-audit --no-fund @solana/web3.js@1 tweetnacl bs58

      - name: Configure SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Restart split-backend container
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_deploy -o BatchMode=yes "$SSH_USER@$SSH_HOST" bash -se <<'REMOTE'
          set -euo pipefail
          cd ~/split
          docker compose restart backend
          docker compose ps backend
          REMOTE

      - name: Wait for /health to report qvac=ready
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            body=$(curl -sS -m 30 https://app.escros.work.gd/api/health || echo '{"error":"curl failed"}')
            echo "[health $i] $body"
            case "$body" in
              *'"state":"ready"'*) echo "QVAC READY"; exit 0 ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for qvac=ready"
          exit 1

      - name: SIWS smoke + time /ai/copilot-preview
        run: BASE_URL=https://app.escros.work.gd/api node scripts/smoke-qvac.mjs
