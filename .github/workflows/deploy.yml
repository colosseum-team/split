name: Deploy

# Manual deploy to the Oracle ARM host running the production stack.
# Trigger from the Actions tab → "Deploy" → "Run workflow" and pick the ref.
#
# Required repository secrets:
#   SSH_HOST          — public IP/hostname of the deploy target
#   SSH_USER          — ssh login (e.g. "ubuntu")
#   SSH_PRIVATE_KEY   — full contents of the OpenSSH private key (begins with
#                       "-----BEGIN OPENSSH PRIVATE KEY-----")
#   JWT_SECRET        — random string (>=32 chars). Used by backend to sign JWTs.
#   POSTGRES_PASSWORD — random string. Used by Postgres + DATABASE_URL.
#
# The host must already have Docker and Compose v2 installed; the workflow
# clones the repo on first run and reuses ~/split on subsequent runs.
# JWT_SECRET and POSTGRES_PASSWORD are written to ~/split/.env every deploy
# so docker-compose picks them up via ${VAR:-default} interpolation.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to deploy'
        required: true
        default: 'main'

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.ref }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Resolve commit SHA
        id: sha
        env:
          REF: ${{ github.event.inputs.ref }}
        run: |
          set -euo pipefail
          SHA=$(git ls-remote https://github.com/${{ github.repository }}.git "$REF" | awk '{print $1}' | head -n1)
          if [ -z "$SHA" ]; then
            # Maybe the input is already a SHA — verify it exists on the remote.
            SHA=$(git ls-remote https://github.com/${{ github.repository }}.git | awk -v r="$REF" '$1 ~ "^"r {print $1; exit}')
          fi
          if [ -z "$SHA" ]; then
            echo "::error::Could not resolve ref '$REF' to a commit on origin"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved $REF → $SHA"

      - name: Configure SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REPO_URL: https://github.com/${{ github.repository }}.git
          DEPLOY_SHA: ${{ steps.sha.outputs.sha }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          # Optional: when these are set the backend flips to the real
          # SolanaChain. If MOCK_CHAIN is empty / absent the compose
          # default (true) is used — preserves the mock-friendly path.
          MOCK_CHAIN: ${{ secrets.MOCK_CHAIN }}
          SOLANA_PROGRAM_ID: ${{ secrets.SOLANA_PROGRAM_ID }}
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
          ARBITER_PUBLIC_KEY: ${{ secrets.SOLANA_ARBITER_PUBLIC_KEY }}
          ARBITER_PRIVATE_KEY: ${{ secrets.SOLANA_ARBITER_KEYPAIR }}
          ARBITER_AUTOEXECUTE: ${{ secrets.ARBITER_AUTOEXECUTE }}
        run: |
          set -euo pipefail
          # Pass DEPLOY_SHA + secrets as command-line variable assignments rather
          # than ssh's SendEnv (most sshd configs reject arbitrary env names).
          # The single-quoted heredoc keeps `$VAR` literal so they expand on the
          # remote side using the values we just supplied.
          ssh -i ~/.ssh/id_deploy -o BatchMode=yes "$SSH_USER@$SSH_HOST" \
            REPO_URL="$REPO_URL" \
            DEPLOY_SHA="$DEPLOY_SHA" \
            JWT_SECRET="$JWT_SECRET" \
            POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            MOCK_CHAIN="$MOCK_CHAIN" \
            SOLANA_PROGRAM_ID="$SOLANA_PROGRAM_ID" \
            SOLANA_RPC_URL="$SOLANA_RPC_URL" \
            ARBITER_PUBLIC_KEY="$ARBITER_PUBLIC_KEY" \
            ARBITER_PRIVATE_KEY="$ARBITER_PRIVATE_KEY" \
            ARBITER_AUTOEXECUTE="$ARBITER_AUTOEXECUTE" \
            bash -se <<'REMOTE'
          set -euo pipefail

          if [ ! -d ~/split/.git ]; then
            git clone "$REPO_URL" ~/split
          fi

          cd ~/split
          git fetch --prune origin
          git checkout --detach "$DEPLOY_SHA"

          # Materialise secrets into ~/split/.env. docker-compose reads .env
          # automatically and interpolates ${VAR} into service env. Chain
          # vars only land if the secret is set so MOCK_CHAIN stays the
          # compose default (true) when no chain bootstrap has happened.
          {
            printf 'JWT_SECRET=%s\n' "${JWT_SECRET}"
            printf 'POSTGRES_PASSWORD=%s\n' "${POSTGRES_PASSWORD}"
            [ -n "${MOCK_CHAIN}" ] && printf 'MOCK_CHAIN=%s\n' "${MOCK_CHAIN}"
            [ -n "${SOLANA_PROGRAM_ID}" ] && printf 'SOLANA_PROGRAM_ID=%s\n' "${SOLANA_PROGRAM_ID}"
            [ -n "${SOLANA_RPC_URL}" ] && printf 'SOLANA_RPC_URL=%s\n' "${SOLANA_RPC_URL}"
            [ -n "${ARBITER_PUBLIC_KEY}" ] && printf 'ARBITER_PUBLIC_KEY=%s\n' "${ARBITER_PUBLIC_KEY}"
            [ -n "${ARBITER_PRIVATE_KEY}" ] && printf "ARBITER_PRIVATE_KEY=%s\n" "${ARBITER_PRIVATE_KEY}"
            [ -n "${ARBITER_AUTOEXECUTE}" ] && printf 'ARBITER_AUTOEXECUTE=%s\n' "${ARBITER_AUTOEXECUTE}"
          } > .env
          chmod 600 .env

          # Build any new images and roll containers; --remove-orphans clears
          # services that have been removed from compose since the last deploy.
          docker compose build --pull
          docker compose up -d --remove-orphans
          docker compose ps
          REMOTE
