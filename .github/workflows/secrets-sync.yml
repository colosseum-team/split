name: Secrets Sync

# Manual workflow that materialises every application secret (everything
# except the SSH credentials used to reach the host) into
# ~/split/.env.secrets on the deploy host. Useful for rotating a secret or
# seeding the file without running a full Deploy.
#
# Required repository secrets:
#   SSH_HOST, SSH_USER, SSH_PRIVATE_KEY  — used only to reach the host;
#                                          NOT written to .env.secrets.
#
# Application secrets (written when set; empty/missing ones are skipped so
# a partial rotation does not blank existing values on disk):
#   JWT_SECRET
#   POSTGRES_PASSWORD
#   MOCK_CHAIN
#   SOLANA_PROGRAM_ID
#   SOLANA_RPC_URL
#   SOLANA_ARBITER_PUBLIC_KEY  → ARBITER_PUBLIC_KEY
#   SOLANA_ARBITER_KEYPAIR     → ARBITER_PRIVATE_KEY
#   ARBITER_AUTOEXECUTE
#   SOLANA_PROGRAM_KEYPAIR
#   SOLANA_DEPLOY_AUTHORITY

on:
  workflow_dispatch:

concurrency:
  group: secrets-sync-prod
  cancel-in-progress: false

jobs:
  sync:
    name: Write .env.secrets on host
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Configure SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MOCK_CHAIN: ${{ secrets.MOCK_CHAIN }}
          SOLANA_PROGRAM_ID: ${{ secrets.SOLANA_PROGRAM_ID }}
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
          ARBITER_PUBLIC_KEY: ${{ secrets.SOLANA_ARBITER_PUBLIC_KEY }}
          ARBITER_PRIVATE_KEY: ${{ secrets.SOLANA_ARBITER_KEYPAIR }}
          ARBITER_AUTOEXECUTE: ${{ secrets.ARBITER_AUTOEXECUTE }}
          SOLANA_PROGRAM_KEYPAIR: ${{ secrets.SOLANA_PROGRAM_KEYPAIR }}
          SOLANA_DEPLOY_AUTHORITY: ${{ secrets.SOLANA_DEPLOY_AUTHORITY }}
        run: |
          set -euo pipefail
          # Pass each secret as a command-line variable assignment (most
          # sshd configs reject SendEnv for arbitrary names). The single-
          # quoted heredoc keeps `$VAR` literal so they expand on the
          # remote side using the values supplied here.
          ssh -i ~/.ssh/id_deploy -o BatchMode=yes "$SSH_USER@$SSH_HOST" \
            JWT_SECRET="$JWT_SECRET" \
            POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            MOCK_CHAIN="$MOCK_CHAIN" \
            SOLANA_PROGRAM_ID="$SOLANA_PROGRAM_ID" \
            SOLANA_RPC_URL="$SOLANA_RPC_URL" \
            ARBITER_PUBLIC_KEY="$ARBITER_PUBLIC_KEY" \
            ARBITER_PRIVATE_KEY="$ARBITER_PRIVATE_KEY" \
            ARBITER_AUTOEXECUTE="$ARBITER_AUTOEXECUTE" \
            SOLANA_PROGRAM_KEYPAIR="$SOLANA_PROGRAM_KEYPAIR" \
            SOLANA_DEPLOY_AUTHORITY="$SOLANA_DEPLOY_AUTHORITY" \
            bash -se <<'REMOTE'
          set -euo pipefail
          umask 077
          mkdir -p ~/split

          # Write to a temp file then atomically rename, so a transport
          # hiccup mid-write can't leave .env.secrets half-populated.
          tmp=$(mktemp ~/split/.env.secrets.XXXXXX)
          {
            [ -n "${JWT_SECRET}" ]              && printf 'JWT_SECRET=%s\n'              "${JWT_SECRET}"
            [ -n "${POSTGRES_PASSWORD}" ]       && printf 'POSTGRES_PASSWORD=%s\n'       "${POSTGRES_PASSWORD}"
            [ -n "${MOCK_CHAIN}" ]              && printf 'MOCK_CHAIN=%s\n'              "${MOCK_CHAIN}"
            [ -n "${SOLANA_PROGRAM_ID}" ]       && printf 'SOLANA_PROGRAM_ID=%s\n'       "${SOLANA_PROGRAM_ID}"
            [ -n "${SOLANA_RPC_URL}" ]          && printf 'SOLANA_RPC_URL=%s\n'          "${SOLANA_RPC_URL}"
            [ -n "${ARBITER_PUBLIC_KEY}" ]      && printf 'ARBITER_PUBLIC_KEY=%s\n'      "${ARBITER_PUBLIC_KEY}"
            [ -n "${ARBITER_PRIVATE_KEY}" ]     && printf 'ARBITER_PRIVATE_KEY=%s\n'     "${ARBITER_PRIVATE_KEY}"
            [ -n "${ARBITER_AUTOEXECUTE}" ]     && printf 'ARBITER_AUTOEXECUTE=%s\n'     "${ARBITER_AUTOEXECUTE}"
            [ -n "${SOLANA_PROGRAM_KEYPAIR}" ]  && printf 'SOLANA_PROGRAM_KEYPAIR=%s\n'  "${SOLANA_PROGRAM_KEYPAIR}"
            [ -n "${SOLANA_DEPLOY_AUTHORITY}" ] && printf 'SOLANA_DEPLOY_AUTHORITY=%s\n' "${SOLANA_DEPLOY_AUTHORITY}"
          } > "$tmp"
          chmod 600 "$tmp"
          mv "$tmp" ~/split/.env.secrets

          echo "Wrote ~/split/.env.secrets ($(wc -l < ~/split/.env.secrets) lines)"
          REMOTE
